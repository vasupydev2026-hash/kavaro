{% extends 'landing/base.html' %}
{% block title %}FAQs{% endblock %}
{% block content %}

<style>

    /* MAIN WRAPPER */
    .faq-wrapper {
        width: 95%;
        max-width: 1000px;
        margin: auto;
        padding: 30px 20px;
        box-sizing: border-box;
    }

    /* CATEGORY BLOCK */
    .category-block {
        background: #ffffff;
        border-radius: 12px;
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.05);
        border: 1px solid #eee;
        margin-bottom: 12px;
        overflow: hidden;
    }

    /* CATEGORY HEADING */
    .category-item {
        padding: 16px 20px;
        font-size: 18px;
        font-weight: 600;
        cursor: pointer;
        color: #333;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #f1f5f9;
    }

    .cat-toggle {
        font-size: 22px;
        font-weight: bold;
    }

    /* QUESTION CARD */
    .faq-card {
        padding: 15px 18px;
        border-top: 1px solid #eee;
        cursor: pointer;
        background: #fff;
    }

    .faq-question {
        font-size: 17px;
        font-weight: 600;
        display: flex;
        justify-content: space-between;
    }

    .q-toggle {
        font-size: 20px;
    }

    .faq-answer {
        display: none;
        padding: 10px 18px 15px 18px;
        font-size: 15px;
        color: #444;
        line-height: 1.6;
        background: #fafafa;
        border-top: 1px solid #eee;
    }
</style>

<h2 style="text-align:center; margin-bottom:25px; font-size:32px;">Help & FAQs</h2>

<div class="faq-wrapper">

    {% for category in categories %}
    <div class="category-block">

        <!-- CATEGORY HEADER -->
        <div class="category-item" data-cat="{{ category.id }}">
            {{ category.title }}
            <span class="cat-toggle">+</span>
        </div>

        <!-- CATEGORY QUESTIONS -->
        <div class="faq-container" id="cat-{{ category.id }}" style="display:none;"></div>

    </div>
    {% endfor %}

</div>

<script>
    // CATEGORY CLICK → LOAD FAQS
    document.querySelectorAll(".category-item").forEach(item => {
        item.addEventListener("click", () => {

            let catId = item.getAttribute("data-cat");
            let currentBox = document.getElementById(`cat-${catId}`);
            let icon = item.querySelector(".cat-toggle");

            // CLOSE OTHER CATEGORIES
            document.querySelectorAll(".faq-container").forEach(box => {
                if (box !== currentBox) box.style.display = "none";
            });
            document.querySelectorAll(".cat-toggle").forEach(i => {
                if (i !== icon) i.textContent = "+";
            });

            // TOGGLE
            if (currentBox.style.display === "block") {
                currentBox.style.display = "none";
                icon.textContent = "+";
                return;
            }

            currentBox.style.display = "block";
            icon.textContent = "−";

            // FETCH DATA
            fetch(`/faq/category/${catId}/`)
                .then(res => res.json())
                .then(data => {
                    let html = "";

                    data.faqs.forEach(f => {
                        html += `
                        <div class="faq-card">
                            <div class="faq-question">
                                ${f.question}
                                <span class="q-toggle">+</span>
                            </div>
                            <div class="faq-answer">${f.answer}</div>
                        </div>`;
                    });

                    currentBox.innerHTML = html;

                    // QUESTION TOGGLE
                    currentBox.querySelectorAll(".faq-question").forEach(q => {
                        q.addEventListener("click", () => {
                            let ans = q.nextElementSibling;
                            let qIcon = q.querySelector(".q-toggle");

                            const open = ans.style.display === "block";

                            currentBox.querySelectorAll(".faq-answer").forEach(a => a.style.display = "none");
                            currentBox.querySelectorAll(".q-toggle").forEach(t => t.textContent = "+");

                            if (!open) {
                                ans.style.display = "block";
                                qIcon.textContent = "−";
                            }
                        });
                    });
                });
        });
    });
</script>

{% endblock %}
