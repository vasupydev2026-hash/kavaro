{% extends 'landing/base.html' %}
{% load static %}
{% block content %}

<style>
:root {
  --bg: #f4f5fb;
  --card-bg: #ffffff;
  --primary: #4F46E5;
  --primary-dark: #4338CA;
  --border: #e5e7eb;
  --text-main: #111827;
  --text-muted: #6b7280;
  --radius: 12px;
  --shadow-soft: 0 10px 30px rgba(15, 23, 42, 0.08);
}

body {
  font-family: "Inter", "Segoe UI", Roboto, sans-serif;
  background-color: var(--bg);
}

/* ===== PAGE WRAPPER & CARD ===== */
.profile-page {
  max-width: 1000px;
  margin: 30px auto;
  padding: 0 15px;
}

.profile-card {
  background: var(--card-bg);
  border-radius: 18px;
  box-shadow: var(--shadow-soft);
  border: 1px solid var(--border);
  padding: 28px 30px 24px;
}

/* ===== HEADER ===== */
.profile-header-title {
  font-size: 22px;
  font-weight: 700;
  color: var(--text-main);
  margin-bottom: 4px;
}

.profile-header-subtitle {
  font-size: 14px;
  color: var(--text-muted);
  margin-bottom: 22px;
}

/* ===== DIVIDER ===== */
.profile-divider {
  height: 1px;
  background-color: var(--border);
  margin: 22px 0;
}

/* ===== MAIN LAYOUT (AVATAR + DETAILS) ===== */
.profile-container {
  display: grid;
  grid-template-columns: 240px minmax(0, 1fr);
  gap: 28px;
  align-items: center;
  justify-items: stretch;
}

/* Avatar section */
.avatar-section {
  display: flex;
  justify-content: center;
  align-items: flex-start;
}

.avatar-wrapper {
  position: relative;
  width: 130px;
  height: 130px;
}

.avatar-wrapper img {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid #e5e7eb;
  box-shadow: 0 4px 15px rgba(15, 23, 42, 0.15);
}

/* ===== PROFILE DETAILS ===== */
.profile-details {
  width: 100%;
  background: transparent;
  box-shadow: none;
  padding: 0;
  border-radius: 0;
}

.profile-details label {
  display: block;
  font-weight: 600;
  color: var(--text-main);
  font-size: 13px;
  margin-top: 10px;
  margin-bottom: 6px;
}

.profile-details input {
  width: 100%;
  padding: 11px 12px;
  border: 1px solid var(--border);
  border-radius: 999px;
  font-size: 14px;
  background-color: #f9fafb;
  color: var(--text-main);
  transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
  box-sizing: border-box;
}

.profile-details input:focus {
  border-color: var(--primary);
  background: #ffffff;
  outline: none;
  box-shadow: 0 0 0 1px rgba(79, 70, 229, 0.15);
}

.profile-details p {
  font-size: 14px;
  color: var(--text-muted);
  margin-top: 12px;
}

/* ===== BUTTONS ===== */
.desktop-btn{
  display: inline-block;
}
.mobile-btn{
  display: none;
}
.profile-details button,.edit-btn,.password-btn,.discard-btn {
  width: 100%;
  padding: 11px 14px;
  margin-top: 14px;
  border: none;
  border-radius: 999px;
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
}

/* Edit button */
.edit-btn{
  background: #eef2ff;
  color: var(--primary);
}
.discard-btn {
  background: #eef2ff;
  color: var(--primary);
  display: none;
}
.edit-btn:hover,.discard-btn:hover {
  background: #e0e7ff;
  box-shadow: 0 4px 10px rgba(148, 163, 184, 0.5);
}

/* Save button */
#save-btn{
  background: var(--primary);
  color: white;
  display: none;
}
#save-btn:hover {
  background: var(--primary-dark);
  box-shadow: 0 4px 12px rgba(79, 70, 229, 0.6);
}

/* Change Password button */
#changePassBtn.loading {
  cursor: not-allowed;
  box-shadow: none !important;
  opacity: 0.6;
  pointer-events: none;
}

/* Prevent hover effects */
#changePassBtn.loading:hover {
  box-shadow: none !important;
  background-color: inherit;
}

.password-btn {
  background: #e0f2fe;
  color: #0369a1;
}
.password-btn:hover {
  background: #bfdbfe;
  box-shadow: 0 4px 10px rgba(59, 130, 246, 0.4);
}

#profile-error {
  color: #dc2626;
  margin-top: 8px;
}
#profile-success {
  color: #16a34a;
  margin-top: 8px;
}

/* ===== PASSWORD MODAL ===== */
.modal {
  display: none;
  position: fixed;
  z-index: 999;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(15, 23, 42, 0.55);
}
.modal-content {
  background-color: #fff;
  padding: 26px 26px 22px;
  border-radius: 16px;
  width: 420px;
  max-width: 92vw;
  box-shadow: 0 12px 40px rgba(15, 23, 42, 0.35);
  text-align: center;
  position: relative;
  animation: fadeIn 0.25s ease-out;
  font-family: inherit;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.close {
  position: absolute;
  top: 10px;
  right: 15px;
  color: #3a3a3a;
  font-size: 35px;
  font-weight: 700;
  cursor: pointer;
}
.close:hover { 
  color: #4b5563;
  transform: scale(1.1) ease;
}

.modal-content h3 {
  margin-bottom: 14px;
  font-weight: 700;
  color: var(--text-main);
}

.modal-content input {
  width: 100%;
  padding: 10px 42px 10px 12px;
  margin: 8px 0;
  border: 1px solid var(--border);
  border-radius: 999px;
  font-size: 14px;
  background: #f9fafb;
  box-sizing: border-box;
}

/* Submit button */
.modal-content button {
  background: var(--primary);
  color: white;
  border: none;
  padding: 10px 18px;
  margin-top: 10px;
  border-radius: 999px;
  cursor: pointer;
  transition: background 0.2s, box-shadow 0.2s;
}
.modal-content button:hover {
  background: var(--primary-dark);
  box-shadow: 0 4px 12px rgba(79, 70, 229, 0.6);
}

/* Strength bar */
#password-strength {
  height: 8px;
  width: 100%;
  margin: 6px 0;
  border-radius: 999px;
  background-color: #e5e7eb;
  overflow: hidden;
}
#password-strength-bar {
  height: 100%;
  width: 0%;
  border-radius: 999px;
  background: linear-gradient(90deg, red, orange, yellow, green);
  transition: width 0.4s ease, background 0.4s ease;
}
.strength-text {
  font-size: 13px;
  font-weight: 600;
  margin-top: 4px;
  color: #374151;
}

/* Password field + eye icon */
.password-field {
  position: relative;
  width: 100%;
  margin: 8px 0;
}
.password-field input {
  width: 100%;
}
.toggle-password {
  position: absolute;
  top: 50%;
  right: 12px;
  transform: translateY(-50%);
  color: #9ca3af;
  font-size: 16px;
  cursor: pointer;
  transition: color 0.2s;
}
.toggle-password:hover,
.toggle-password.active {
  color: var(--primary);
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .desktop-btn{
    display: none;
  }
  .discard-btn{
    display: none;
  }
  .mobile-btn{
    display: inline-block;
  }
  .profile-card {
    padding: 20px 18px 18px;
    border-radius: 0;
  }

  .profile-container {
    grid-template-columns: 1fr;
    text-align: center;
  }

  .profile-details label {
    text-align: left;
  }

  .avatar-section {
    margin-bottom: 6px;
  }

  .profile-header-title,
  .profile-header-subtitle {
    text-align: center;
  }
}

/* ---------------------------------------------------------------- */
/* 🔥 NEW CSS OVERRIDES — ONLY WHAT YOU REQUESTED 🔥 */
/* ---------------------------------------------------------------- */

/* Avatar placed at top left */
.avatar-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start !important;
  height: 100%;
}

/* Move buttons to bottom */
/* Correct: Move buttons to bottom WITHOUT changing visibility logic */
.edit-btn,
.password-btn {
  width: 100%;
  margin-top: auto;
  margin-bottom: 10px;
}


/* Ensure avatar stays above */
.avatar-wrapper {
  margin-bottom: 40px;
}

</style>



<div class="profile-page">
  <div class="profile-card">
    <!-- Header -->
    <div class="profile-header">
      <h2 class="profile-header-title">Profile Settings</h2>
      <p class="profile-header-subtitle">
        Manage your personal information and account security.
      </p>
    </div>

    <!-- hidden CSRF for AJAX -->
    <form id="csrf-form" style="display:none;">
      {% csrf_token %}
    </form>

    <!-- Main layout -->
    <div class="profile-container">
      <div class="avatar-section">
        <div class="avatar-wrapper">
          <!-- STATIC AVATAR ONLY -->
          <img id="avatar-img"
            src="{% static 'base/images/defaultprofile2.webp' %}"
            alt="Avatar"
            style="cursor: not-allowed;"
          >
        </div>

        <button class="edit-btn desktop-btn" type="button">Edit Profile</button>
        <button class="password-btn desktop-btn" type="button">Change Password</button>

      </div>

      <div class="profile-details">
        <label for="name">Username:</label>
        <input type="text" id="name" value="{{ request.user.username }}" disabled>

        <label for="email">Email:</label>
        <input type="email" id="email" value="{{ request.user.email }}" disabled>

        <label for="phone">Phone:</label>
        <input type="text" id="phone" value="{{ profile.phone_number }}" disabled style="cursor: not-allowed;">
        <button class="edit-btn mobile-btn" type="button">Edit Profile</button>
        <button id="save-btn" type="button">Save Changes</button>
        <button class="discard-btn"  type="button">Discard Changes</button>
        <button class="password-btn mobile-btn" type="button">Change Password</button>
        

        <p id="profile-error"></p>
        <p id="profile-success"></p>
      </div>
    </div>

    <div class="profile-divider"></div>
  </div>
</div>

<!-- Password Modal -->
<div id="passwordModal" class="modal">
  <div class="modal-content">
    <span class="close">&times;</span>
    <h3>Change Password</h3>

    <form id="passwordForm">
      {% csrf_token %}

      <div class="password-field">
        <input type="password" name="old_password" id="old_password" placeholder="Old Password" required>
      </div>

      <div class="password-field">
        <input type="password" name="new_password1" id="new_password1" placeholder="New Password" required>
      </div>

      <div id="password-strength">
        <div id="password-strength-bar"></div>
      </div>
      <div class="strength-text" id="strength-text"></div>

      <div class="password-field">
        <input type="password" name="new_password2" id="new_password2" placeholder="Confirm New Password" required>
      </div>

      <button id="changePassBtn" type="submit">Change Password</button>
    </form>

    <p id="password-error" style="color: red; margin-top:10px;"></p>
    <p id="password-success" style="color: green; margin-top:10px;"></p>
  </div>
</div>
{% endblock %}
