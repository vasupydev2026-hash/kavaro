{% extends 'landing/base.html' %}
{% block title %}Products{% endblock %}

{% block content %}

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

:root {
    --bg: #f4f4f5;
    --card: #ffffff;
    --text-main: #0f172a;
    --text-muted: #6b7280;
    --accent: #111827;
    --border: #e5e7eb;
    --shadow: 0 12px 30px rgba(0,0,0,0.08);
}

/* * {
    font-family: 'Inter', system-ui, sans-serif;
} */

/* PAGE */
.page {
    background: var(--bg);
    padding: 24px 14px 60px;
}

.container {
    max-width: 1320px;
    margin: auto;
}

/* FILTER BUTTONS */
.filter-buttons {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
}

.filter-buttons a {
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 0.85rem;
    text-decoration: none;
    border: 1px solid var(--accent);
    color: var(--accent);
    transition: .2s ease;
}

.filter-buttons a:hover {
    background: var(--accent);
    color: #fff;
}

/* COLLECTION SECTIONS */
.collections {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    margin-bottom: 40px;
}

.collection-card {
    position: relative;
    border-radius: 14px;
    overflow: hidden;
}

.collection-card img {
    width: 100%;
    height: 260px;
    object-fit: cover;
}

.collection-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 1.4rem;
    font-weight: 700;
}

/* PRODUCT GRID */
.products-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 26px;
}

/* CARD */
.product-card {
    background: var(--card);
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid var(--border);
    transition: transform .25s ease, box-shadow .25s ease;
}

.product-card:hover {
    transform: translateY(-6px);
    box-shadow: var(--shadow);
}

.product-image-wrapper {
    background: #fafafa;
    overflow: hidden;
}

.product-image {
    width: 100%;
    height: 320px;
    object-fit: cover;
    transition: transform .35s ease;
}

.product-card:hover .product-image {
    transform: scale(1.05);
}

.product-info {
    padding: 14px 16px 18px;
}

.product-name {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text-main);
    margin-bottom: 6px;
    line-height: 1.4;

    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

.product-price {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--accent);
}

.view-btn {
    margin-top: 12px;
    width: 100%;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid var(--accent);
    background: transparent;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: .2s ease;
}

.view-btn:hover {
    background: var(--accent);
    color: #fff;
}

/* RESPONSIVE */
@media (max-width: 1024px) {
    .products-grid {
        grid-template-columns: repeat(3, 1fr);
    }
    .collections {
        grid-template-columns: repeat(2, 1fr);
    }
}

@media (max-width: 640px) {
    .products-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
    }
    .product-image {
        height: 220px;
    }
}
</style>

<div class="page">
<div class="container">

    <!-- SEASON FILTER (UNCHANGED FUNCTIONALITY) -->
    <div class="filter-buttons">
        {% for s in seasons %}
        <a href="?season={{ s.name }}">{{ s.name }}</a>
        {% endfor %}
    </div>

    <!-- PRODUCT LIST (CORE FUNCTIONALITY UNTOUCHED) -->
    <div class="products-grid">
        {% for product in products %}
        <div class="product-card">
            <a href="{% url 'product_detail' product.id %}">
                <div class="product-image-wrapper">
                    <img src="{{ product.image_url }}" alt="{{ product.name }}" class="product-image">
                </div>
            </a>

            <div class="product-info">
                <div class="product-name">{{ product.name }}</div>
                <div class="product-price">₹ {{ product.price }}</div>

                <a href="{% url 'product_detail' product.id %}">
                    <button class="view-btn">View Product</button>
                </a>
            </div>
        </div>
        {% endfor %}
    </div>

</div>
</div>

{% endblock %}
